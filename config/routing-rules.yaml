# Routing Rules — Reglas hardcodeadas del Meta-Router
# Estas reglas no se negocian ni se saltean por urgencia

# Keywords que fuerzan L4 en cualquier pedido de dev
l4_keywords:
  financial:
    - pago
    - payment
    - dinero
    - money
    - wallet
    - cobro
    - factura
    - invoice
    - conciliación
    - liquidación
    - settlement
    - tarjeta
    - card
    - cuenta bancaria
  auth:
    - auth
    - login
    - sesión
    - session
    - token
    - JWT
    - OAuth
    - SSO
    - credenciales
    - password
  compliance:
    - BCRA
    - PCI
    - PCI DSS
    - compliance
    - datos sensibles
    - datos personales
    - auditoría

# L4 requiere SIEMPRE (no negociable)
l4_required_agents:
  - dev-architect
  - dev-security

# Dominio por tipo de pedido
domain_routing:
  dev:
    keywords:
      - bug
      - error
      - fix
      - feature
      - endpoint
      - API
      - base de datos
      - deploy
      - infra
      - performance
      - test
      - código
      - PR
      - refactor
    primary_orchestrator: dev-orchestrator

  product:
    keywords:
      - qué construir
      - roadmap
      - discovery
      - usuario
      - research
      - validar
      - hipótesis
      - UX
      - diseño
      - backlog
      - historia de usuario
      - métrica de producto
    primary_orchestrator: product-orchestrator

  marketing:
    keywords:
      - copy
      - campaña
      - contenido
      - redes sociales
      - brand
      - SEO
      - ads
      - lanzamiento
      - comunidad
      - post
    primary_orchestrator: marketing-orchestrator

# Pipelines cross-domain
cross_domain_pipelines:
  launch:
    description: Lanzamiento de feature o producto
    sequence:
      - product-orchestrator  # define scope y métricas
      - dev-orchestrator      # implementa
      - marketing-orchestrator # comunica
      - product-orchestrator  # mide resultados

  growth:
    description: Iniciativa de crecimiento que cruza dominios
    sequence:
      - product-orchestrator  # identifica cuello de botella
      - dev-orchestrator      # implementa cambios
      - marketing-orchestrator # ajusta comunicación

  incident:
    description: Incidente en producción
    sequence:
      - dev-orchestrator      # diagnóstico y fix
      - product-orchestrator  # impacto en usuario
      - marketing-orchestrator # comunicación (si escala)

# Provider routing — qué proveedor y modelo usa cada agente
# Precedencia: ceremony_overrides > agent_providers > task_type_routing
provider_routing:

  # L4 siempre usa Claude — nunca negociable
  l4_provider_lock: claude

  providers:
    claude:
      description: Razonamiento profundo, compliance, decisiones irreversibles, L3/L4
      api: anthropic
      models:
        high: claude-opus-4-8
        medium: claude-opus-4-8
        low: claude-haiku-4-5-20251001

    codex:
      description: Generación de código, refactor, implementación L1/L2
      api: openai
      models:
        default: codex-5.5

    ollama:
      description: Modelos abiertos vía Ollama Cloud — clasificación, ruteo, borradores e
        implementación de bajo/medio riesgo cuando el owner corre el harness sin Anthropic.
      api: ollama_cloud
      # Nomenclatura Ollama Cloud: los modelos hosteados llevan tag `:cloud`.
      models:
        general: llama3.1
        code: qwen2.5-coder
        # Hermes (NousResearch) — tuneado para function-calling y structured output.
        # Mejor que llama3.1 para roles de tool-dispatch (router + orquestadores) y agentes.
        hermes: hermes3:cloud
        # Kimi K2 (Moonshot) — MoE fuerte en coding y uso agéntico de tools. Backing actual del owner.
        kimi: kimi-k2.7-code:cloud
      # Modelo de backing por defecto cuando se corre el harness sobre Ollama Cloud.
      default: kimi-k2.7-code:cloud

  # ─── Cómo se resuelve el modelo según el runtime ───────────────────────────
  # IMPORTANTE: esta matriz por-agente es un CONTRATO DECLARATIVO de intención.
  # Cuánto se respeta depende del runtime que ejecute el harness:
  model_resolution:
    opencode:
      # OpenCode configura modelo POR AGENTE → la matriz agent_providers se aplica tal cual.
      respects_per_agent: true
    claude_code:
      # Claude Code resuelve el `model:` del frontmatter de cada subagente contra los modelos
      # que el runtime tiene disponibles. Para usar Ollama Cloud se apunta el runtime a un
      # endpoint OpenAI-compatible (ANTHROPIC_BASE_URL → gateway/Ollama Cloud), con lo cual
      # TODOS los subagentes comparten el MISMO modelo de backing global (hoy: kimi-k2.7-code:cloud).
      respects_per_agent: false
      backing_model_is_global: true
      # Consecuencia: bajo Claude Code la calidad NO la da el ruteo por-agente sino la
      # AUTOSUFICIENCIA de los artefactos. Por eso épicas/tareas se especifican en `reforzado`
      # (ver roadmap-management → estándar de granularidad) cuando el backing es abierto.

  # ─── Portabilidad por capacidad del modelo ─────────────────────────────────
  # El harness debe correr con Anthropic Claude, Ollama Hermes y Ollama Kimi indistintamente.
  capability_tiers:
    frontier:
      models: [claude-opus-4-8, codex-5.5]
      detalle_ejecucion: estándar   # el modelo rellena contexto razonable
    open_mid:
      models: [kimi-k2.7-code:cloud, hermes3:cloud, qwen2.5-coder, llama3.1]
      detalle_ejecucion: reforzado  # tareas atómicas con path + "Hecho cuando" + Contrato
      # Regla: con backing open_mid, los artefactos se elevan a `reforzado` aunque el ceremony
      # level sea L1/L2. A menor capacidad del modelo, mayor explicitud del artefacto.
    note: >
      L4 sigue exigiendo razonamiento frontier para architect+security. Si el único backing
      disponible es open_mid, L4 NO se auto-aprueba: se marca y se escala al owner.

  # Provider por agente (default — puede ser sobreescrito por ceremony_overrides)
  agent_providers:
    # Orquestadores → Ollama Cloud (ruteo determinístico, bajo costo)
    meta-router: ollama/llama3.1
    dev-orchestrator: ollama/llama3.1
    product-orchestrator: ollama/llama3.1
    marketing-orchestrator: ollama/llama3.1

    # Dev L4 — Claude Opus (inamovible)
    dev-architect: claude/claude-opus-4-8
    dev-security: claude/claude-opus-4-8

    # Dev — implementación pura → Codex; juicio/review → Claude
    dev-technical-leader: claude/claude-opus-4-8    # review + mentoring requiere razonamiento
    dev-senior-backend: codex/codex-5.5
    dev-senior-frontend: codex/codex-5.5
    dev-junior-backend: codex/codex-5.5
    dev-junior-frontend: codex/codex-5.5
    dev-devops: claude/claude-opus-4-8              # infra/CI requiere juicio contextual
    dev-qa: claude/claude-opus-4-8                  # diseño de tests requiere razonamiento
    dev-monitoreo: claude/claude-opus-4-8           # análisis de SLOs y alertas
    dev-project-leader: claude/claude-opus-4-8      # roadmap y priorización

    # Product — estrategia y discovery → Claude Opus
    product-leader: claude/claude-opus-4-8
    product-strategist: claude/claude-opus-4-8
    product-owner: claude/claude-opus-4-8
    product-ux-researcher: claude/claude-opus-4-8
    product-senior-designer: claude/claude-opus-4-8
    product-junior-designer: ollama/llama3.1
    product-analyst: claude/claude-opus-4-8

    # Marketing — estrategia y copy → Claude Opus; bajo riesgo → Ollama
    marketing-leader: claude/claude-opus-4-8
    marketing-brand-strategist: claude/claude-opus-4-8
    marketing-content-strategist: claude/claude-opus-4-8
    marketing-senior-copywriter: claude/claude-opus-4-8
    marketing-junior-copywriter: ollama/llama3.1
    marketing-senior-creative: claude/claude-opus-4-8
    marketing-junior-designer: ollama/llama3.1
    marketing-growth-marketer: claude/claude-opus-4-8
    marketing-community-manager: ollama/llama3.1
    marketing-analyst: claude/claude-opus-4-8

  # Overrides por ceremony level (tienen mayor precedencia que agent_providers)
  ceremony_overrides:
    L4:
      # Todos los agentes de implementación suben a Claude en L4
      dev-senior-backend: claude/claude-opus-4-8
      dev-senior-frontend: claude/claude-opus-4-8
      dev-junior-backend: claude/claude-opus-4-8
      dev-junior-frontend: claude/claude-opus-4-8
      # Architect y Security siempre Opus — redundante pero explícito
      dev-architect: claude/claude-opus-4-8
      dev-security: claude/claude-opus-4-8
    L3:
      # En L3 los seniors usan Claude (contexto arquitectónico crítico)
      dev-senior-backend: claude/claude-opus-4-8
      dev-senior-frontend: claude/claude-opus-4-8

  # Routing por tipo de tarea (menor precedencia — se aplica cuando el nivel no es L3/L4)
  task_type_routing:
    code_generation:
      preferred_provider: codex
      applies_to: [dev-senior-backend, dev-senior-frontend, dev-junior-backend, dev-junior-frontend]
    architecture:
      preferred_provider: claude
      model: claude-opus-4-8
      applies_to: [dev-architect, dev-technical-leader]
    classification:
      preferred_provider: ollama
      model: llama3.1
      applies_to: [meta-router, dev-orchestrator, product-orchestrator, marketing-orchestrator]
    security_review:
      preferred_provider: claude
      model: claude-opus-4-8
      applies_to: [dev-security]
      override: true  # inamovible — nunca puede cambiar de provider

# Escalamiento por urgencia
urgency_overrides:
  production_down:
    skip_to: dev-orchestrator
    level: L3_minimum
    notify: [dev-architect, dev-monitoreo]
  security_breach:
    skip_to: dev-orchestrator
    level: L4
    notify: [dev-architect, dev-security, dev-devops]
