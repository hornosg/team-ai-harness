# Routing Rules — Reglas hardcodeadas del Meta-Router
# Estas reglas no se negocian ni se saltean por urgencia

# Keywords que fuerzan L4 en cualquier pedido de dev
l4_keywords:
  financial:
    - pago
    - payment
    - dinero
    - money
    - wallet
    - cobro
    - factura
    - invoice
    - conciliación
    - liquidación
    - settlement
    - tarjeta
    - card
    - cuenta bancaria
  auth:
    - auth
    - login
    - sesión
    - session
    - token
    - JWT
    - OAuth
    - SSO
    - credenciales
    - password
  compliance:
    - BCRA
    - PCI
    - PCI DSS
    - compliance
    - datos sensibles
    - datos personales
    - auditoría

# L4 requiere SIEMPRE (no negociable)
l4_required_agents:
  - dev-architect
  - dev-security

# Dominio por tipo de pedido
domain_routing:
  dev:
    keywords:
      - bug
      - error
      - fix
      - feature
      - endpoint
      - API
      - base de datos
      - deploy
      - infra
      - performance
      - test
      - código
      - PR
      - refactor
    primary_orchestrator: dev-orchestrator

  product:
    keywords:
      - qué construir
      - roadmap
      - discovery
      - usuario
      - research
      - validar
      - hipótesis
      - UX
      - diseño
      - backlog
      - historia de usuario
      - métrica de producto
    primary_orchestrator: product-orchestrator

  marketing:
    keywords:
      - copy
      - campaña
      - contenido
      - redes sociales
      - brand
      - SEO
      - ads
      - lanzamiento
      - comunidad
      - post
    primary_orchestrator: marketing-orchestrator

# Pipelines cross-domain
cross_domain_pipelines:
  launch:
    description: Lanzamiento de feature o producto
    sequence:
      - product-orchestrator  # define scope y métricas
      - dev-orchestrator      # implementa
      - marketing-orchestrator # comunica
      - product-orchestrator  # mide resultados

  growth:
    description: Iniciativa de crecimiento que cruza dominios
    sequence:
      - product-orchestrator  # identifica cuello de botella
      - dev-orchestrator      # implementa cambios
      - marketing-orchestrator # ajusta comunicación

  incident:
    description: Incidente en producción
    sequence:
      - dev-orchestrator      # diagnóstico y fix
      - product-orchestrator  # impacto en usuario
      - marketing-orchestrator # comunicación (si escala)

# Provider routing — qué proveedor y modelo usa cada agente
# Precedencia: ceremony_overrides > agent_providers > task_type_routing
provider_routing:

  # L4 siempre usa Claude — nunca negociable
  l4_provider_lock: claude

  # Política de modelos (ADR-001, 2026-07-02): Anthropic-first en tres tiers —
  # haiku (ruteo/bajo riesgo), sonnet (implementación), opus (crítico/L3-L4).
  # Codex (OpenAI) fue retirado de la matriz. Ollama queda SOLO como fallback manual.
  providers:
    claude:
      description: Único provider activo. haiku = ruteo/clasificación/bajo riesgo;
        sonnet = implementación de código; opus = razonamiento profundo, compliance,
        decisiones irreversibles, L3/L4.
      api: anthropic
      models:
        high: claude-opus-4-8
        medium: claude-sonnet-5
        low: claude-haiku-4-5-20251001

    ollama:
      description: FALLBACK MANUAL DE EMERGENCIA — no participa del ruteo normal.
        Cuando el owner agota tokens Anthropic, relanza la sesión con
        `claude --dangerously-skip-permissions --model kimi-k2.7-code:cloud`.
        El backing pasa a ser GLOBAL (todos los agentes corren kimi) y el detalle de
        ejecución de los artefactos sube a `reforzado` (ver capability_tiers).
      api: ollama_cloud
      models:
        kimi: kimi-k2.7-code:cloud
      default: kimi-k2.7-code:cloud

  # ─── Portabilidad por capacidad del modelo ─────────────────────────────────
  # Vigente para el escenario de fallback kimi: a menor capacidad del backing,
  # mayor explicitud del artefacto.
  capability_tiers:
    frontier:
      models: [claude-opus-4-8, claude-sonnet-5, claude-haiku-4-5-20251001]
      detalle_ejecucion: estándar   # el modelo rellena contexto razonable
    open_mid:
      models: [kimi-k2.7-code:cloud]
      detalle_ejecucion: reforzado  # tareas atómicas con path + "Hecho cuando" + Contrato
      # Regla: con backing open_mid, los artefactos se elevan a `reforzado` aunque el ceremony
      # level sea L1/L2.
    note: >
      L4 sigue exigiendo razonamiento frontier para architect+security. Si el único backing
      disponible es open_mid (fallback kimi), L4 NO se auto-aprueba: se marca y se escala al owner.

  # Provider por agente (default — puede ser sobreescrito por ceremony_overrides)
  agent_providers:
    # Orquestadores → haiku (ruteo determinístico, bajo costo)
    meta-router: claude/claude-haiku-4-5-20251001
    dev-orchestrator: claude/claude-haiku-4-5-20251001
    product-orchestrator: claude/claude-haiku-4-5-20251001
    marketing-orchestrator: claude/claude-haiku-4-5-20251001

    # Dev L4 — Claude Opus (inamovible)
    dev-architect: claude/claude-opus-4-8
    dev-security: claude/claude-opus-4-8

    # Dev — implementación → sonnet; juicio/review → opus
    dev-technical-leader: claude/claude-opus-4-8    # review + mentoring requiere razonamiento
    dev-senior-backend: claude/claude-sonnet-5
    dev-senior-frontend: claude/claude-sonnet-5
    dev-junior-backend: claude/claude-sonnet-5
    dev-junior-frontend: claude/claude-sonnet-5
    dev-devops: claude/claude-opus-4-8              # infra/CI requiere juicio contextual
    dev-qa: claude/claude-opus-4-8                  # diseño de tests requiere razonamiento
    dev-monitoreo: claude/claude-opus-4-8           # análisis de SLOs y alertas
    dev-project-leader: claude/claude-opus-4-8      # roadmap y priorización

    # Product — estrategia y discovery → opus; bajo riesgo → haiku
    product-leader: claude/claude-opus-4-8
    product-strategist: claude/claude-opus-4-8
    product-owner: claude/claude-opus-4-8
    product-ux-researcher: claude/claude-opus-4-8
    product-senior-designer: claude/claude-opus-4-8
    product-junior-designer: claude/claude-haiku-4-5-20251001
    product-analyst: claude/claude-opus-4-8

    # Marketing — estrategia y copy → opus; bajo riesgo → haiku
    marketing-leader: claude/claude-opus-4-8
    marketing-brand-strategist: claude/claude-opus-4-8
    marketing-content-strategist: claude/claude-opus-4-8
    marketing-senior-copywriter: claude/claude-opus-4-8
    marketing-junior-copywriter: claude/claude-haiku-4-5-20251001
    marketing-senior-creative: claude/claude-opus-4-8
    marketing-junior-designer: claude/claude-haiku-4-5-20251001
    marketing-growth-marketer: claude/claude-opus-4-8
    marketing-community-manager: claude/claude-haiku-4-5-20251001
    marketing-analyst: claude/claude-opus-4-8

  # Overrides por ceremony level (tienen mayor precedencia que agent_providers)
  ceremony_overrides:
    L4:
      # Todos los agentes de implementación suben a Claude en L4
      dev-senior-backend: claude/claude-opus-4-8
      dev-senior-frontend: claude/claude-opus-4-8
      dev-junior-backend: claude/claude-opus-4-8
      dev-junior-frontend: claude/claude-opus-4-8
      # Architect y Security siempre Opus — redundante pero explícito
      dev-architect: claude/claude-opus-4-8
      dev-security: claude/claude-opus-4-8
    L3:
      # En L3 los seniors usan Claude (contexto arquitectónico crítico)
      dev-senior-backend: claude/claude-opus-4-8
      dev-senior-frontend: claude/claude-opus-4-8

  # Routing por tipo de tarea (menor precedencia — se aplica cuando el nivel no es L3/L4)
  task_type_routing:
    code_generation:
      preferred_provider: claude
      model: claude-sonnet-5
      applies_to: [dev-senior-backend, dev-senior-frontend, dev-junior-backend, dev-junior-frontend]
    architecture:
      preferred_provider: claude
      model: claude-opus-4-8
      applies_to: [dev-architect, dev-technical-leader]
    classification:
      preferred_provider: claude
      model: claude-haiku-4-5-20251001
      applies_to: [meta-router, dev-orchestrator, product-orchestrator, marketing-orchestrator]
    security_review:
      preferred_provider: claude
      model: claude-opus-4-8
      applies_to: [dev-security]
      override: true  # inamovible — nunca puede cambiar de provider

# Escalamiento por urgencia
urgency_overrides:
  production_down:
    skip_to: dev-orchestrator
    level: L3_minimum
    notify: [dev-architect, dev-monitoreo]
  security_breach:
    skip_to: dev-orchestrator
    level: L4
    notify: [dev-architect, dev-security, dev-devops]

# ─── Loop mode — driver de iteraciones sin owner en el medio ─────────────────
# Aplica cuando el meta-router opera vía `next-task` (skills/shared/loop-next-task)
# invocado desde scripts/loop-runner.sh. Origen: PROP-008 / E33.
loop_mode:
  # Regla no negociable: L4 NUNCA corre desatendido en loop.
  l4_unattended: forbidden
  # Semántica del freno L4 en loop = "escalar y continuar" (no frena la corrida completa):
  l4_in_loop_policy:
    - "La iteración que detecta l4_keywords implementa hasta el gate (build/test verdes)."
    - "Escribe la escalación en management/escalations/YYYY-MM-DD_<slug-tarea>.md + Engram (mem_save)."
    - "NO commitea sin sign-off explícito del owner, sin excepción."
    - "El loop continúa con la próxima tarea sin dependencias pendientes en la iteración siguiente."
  # Presupuesto gobernado por contexto, no por número fijo de iteraciones:
  budget:
    unit: contexto             # no "iteraciones" — una tarea por iteración siempre
    checkpoint_at: "~50% ventana (≈100k tokens)"
    checkpoint_action: "resumen estructurado hecho/falta/próximo paso; próxima iteración retoma"
    max_turns_proxy: 40        # proxy en scripts/loop-runner.sh (--max-turns)
    stall_threshold: 3         # iteraciones consecutivas sin cerrar la MISMA tarea
    stall_action: "devolver a replanificación (skills/dev/atomic-session-planning), no seguir iterando"
    no_progress_threshold: 2   # iteraciones consecutivas sin marcar ningún [x] en roadmap/épica
    no_progress_action: "loop-runner.sh se detiene solo"
  # Kill-switch manual, chequeado por el runner antes de cada iteración:
  kill_switch_file: .loop-stop
  # Permisos: override del owner (2026-07-02, ver E33 §Notas) — corre con
  # --dangerously-skip-permissions sin restricción de path. Supersede la mitigación
  # original de PROP-008 ("nunca sobre $HOME"): el owner usa este flag siempre y
  # prefiere el riesgo a que el loop se frene por prompts de permiso.
  permissions_policy: "--dangerously-skip-permissions sin restricción — decisión explícita del owner, riesgo asumido"
  # Workload de referencia (PROP-008): apto para retrofits mecánicos con patrón ya
  # diseñado (E24-E30). Explícitamente NO aplica a trabajo de aprendizaje del owner (E12-E18).
